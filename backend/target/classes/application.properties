# Application Properties for Hotel & Restaurant Management Service

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/hoteldb?reWriteBatchedInserts=true
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hikari Connection Pool Settings for 100+ TPS
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# JPA/Hibernate Settings
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Redis Cache Settings
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Logging Settings
logging.level.com.hotel.mgmt=INFO
logging.level.org.springframework.cache=INFO
logging.level.org.hibernate.SQL=ERROR
